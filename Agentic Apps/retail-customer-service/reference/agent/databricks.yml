bundle:
  name: cs_agent_workshop

variables:
  catalog:
    description: "Workshop catalog (set by user_setup.py)"
    default: "cs_agent_workshop"
  schema:
    description: "Your UC schema for UC Functions (set by user_setup.py)"
    default: "shared"
  lakebase_instance:
    description: "Shared Lakebase instance name (set by user_setup.py)"
    default: "cs-agent-workshop-memory"
  lakebase_schema:
    description: "Per-user Postgres schema in Lakebase for conversation memory (set by user_setup.py)"
    default: ""
  app_name:
    description: "Your Databricks App name — cs-agent-<username> (set by user_setup.py)"
    default: "cs-agent-workshop"

resources:
  experiments:
    cs_agent_workshop_experiment:
      name: /Users/${workspace.current_user.userName}/cs-agent-workshop-${bundle.target}

  apps:
    cs_agent:
      name: "${var.app_name}"
      description: "TechMart customer service agent (workshop)"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_INSTANCE_NAME
            value: "${var.lakebase_instance}"
          - name: LAKEBASE_AGENT_MEMORY_SCHEMA
            value: "${var.lakebase_schema}"
          - name: WORKSHOP_CATALOG
            value: "${var.catalog}"
          - name: WORKSHOP_SCHEMA
            value: "${var.schema}"
          - name: LOG_LEVEL
            value: "INFO"
          - name: DATABRICKS_EMBEDDING_ENDPOINT
            value: "databricks-gte-large-en"

      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ${resources.experiments.cs_agent_workshop_experiment.experiment_id}
            permission: 'CAN_MANAGE'
        - name: 'database'
          database:
            instance_name: "${var.lakebase_instance}"
            database_name: 'databricks_postgres'
            permission: 'CAN_CONNECT_AND_CREATE'
        - name: 'fn_product_lookup'
          uc_securable:
            securable_full_name: "${var.catalog}.${var.schema}.product_lookup"
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'fn_get_product_details'
          uc_securable:
            securable_full_name: "${var.catalog}.${var.schema}.get_product_details"
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'fn_get_order_status'
          uc_securable:
            securable_full_name: "${var.catalog}.${var.schema}.get_order_status"
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'fn_get_return_policy'
          uc_securable:
            securable_full_name: "${var.catalog}.${var.schema}.get_return_policy"
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'vs_product_docs'
          uc_securable:
            securable_full_name: "${var.catalog}.shared.product_docs_vs"
            securable_type: 'TABLE'
            permission: 'SELECT'

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    resources:
      apps:
        cs_agent:
          name: "${var.app_name}"
