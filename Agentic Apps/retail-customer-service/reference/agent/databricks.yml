bundle:
  name: cs_agent_workshop

resources:
  apps:
    cs_agent:
      name: "cs-agent-robert-mosley"
      description: "TechMart customer service agent (workshop)"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_INSTANCE_NAME
            value: "DONOTDELETE-vibe-coding-workshop-lakebase"
          - name: LAKEBASE_AGENT_MEMORY_SCHEMA
            value: "cs_agent_workshop_robert_mosley"
          - name: WORKSHOP_CATALOG
            value: "cs_agent_workshop"
          - name: WORKSHOP_SCHEMA
            value: "robert_mosley"
          - name: LOG_LEVEL
            value: "INFO"
          - name: DATABRICKS_EMBEDDING_ENDPOINT
            value: "databricks-gte-large-en"

      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "4360790536598970"
            permission: 'CAN_MANAGE'
        - name: 'database'
          database:
            instance_name: 'DONOTDELETE-vibe-coding-workshop-lakebase'
            database_name: 'databricks_postgres'
            permission: 'CAN_CONNECT_AND_CREATE'
        - name: 'fn_product_lookup'
          uc_securable:
            securable_full_name: 'cs_agent_workshop.robert_mosley.product_lookup'
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'fn_get_product_details'
          uc_securable:
            securable_full_name: 'cs_agent_workshop.robert_mosley.get_product_details'
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'fn_get_order_status'
          uc_securable:
            securable_full_name: 'cs_agent_workshop.robert_mosley.get_order_status'
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'fn_get_return_policy'
          uc_securable:
            securable_full_name: 'cs_agent_workshop.robert_mosley.get_return_policy'
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'vs_product_docs'
          uc_securable:
            securable_full_name: 'cs_agent_workshop.shared.product_docs_vs'
            securable_type: 'TABLE'
            permission: 'SELECT'

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    resources:
      apps:
        cs_agent:
          name: cs-agent-robert-mosley